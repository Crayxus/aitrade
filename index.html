<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICH TRADER</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Ticker Tape -->
<div class="ticker-tape">
  <div class="ticker-inner" id="ticker-inner">
    <!-- populated by JS -->
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-mark">R</div>
    <div>
      <div class="logo-name">RICH TRADER</div>
      <div class="logo-sub">INTRADAY CFD SIGNALS</div>
    </div>
  </div>

  <div class="header-mid">
    <div id="clock">--:--:--</div>
    <div class="session-pill">
      <span class="dot dot-red" id="session-dot"></span>
      <span id="session-label">LOADING</span>
    </div>
  </div>

  <div class="header-right">
    <span id="pnl-updated"></span>
    <span id="date-display"></span>
    <button id="refresh-btn">
      <span id="btn-icon">↻</span>
      REFRESH
    </button>
  </div>
</header>

<!-- Live Stats Bar -->
<div id="live-bar">
  <div class="live-item">
    <span class="live-label">TODAY P&L</span>
    <span id="portfolio-pnl" class="live-value muted">–</span>
  </div>
  <div class="live-divider"></div>
  <div class="live-item">
    <span class="live-label">CLOSE IN</span>
    <span id="countdown" class="live-value blue">–:–:–</span>
  </div>
  <div class="live-divider"></div>
  <div class="live-item">
    <span class="live-label">POSITIONS</span>
    <span id="position-count" class="live-value muted">–</span>
  </div>
</div>

<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">FETCHING LIVE MARKET DATA...</div>
</div>

<!-- Main -->
<main>
  <div id="status-bar">
    <span id="status-text">INITIALIZING</span>
    <span id="cached-label" class="tag" style="display:none"></span>
  </div>
  <div class="grid" id="grid"></div>

  <!-- Day Summary Panel -->
  <div id="summary-panel" style="display:none"></div>

  <!-- Trading History Panel -->
  <div id="history-panel" style="display:none"></div>
</main>

<footer>
  RISK DISCLAIMER &nbsp;·&nbsp; Algorithmic signals for reference only. Not financial advice.
  CFD trading involves significant risk of loss. Trade at your own risk.
</footer>

<script src="/js/app.js"></script>
</body>
</html>
